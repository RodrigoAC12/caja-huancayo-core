services:
  postgres:
    image: postgres:16
    container_name: caja_huancayo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bd_caja_huancayo_core}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - caja_huancayo_pgdata:/var/lib/postgresql/data
      - ./database:/database
volumes:
  caja_huancayo_pgdata:
